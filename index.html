<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeGD Digital Governance Dashboard</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>

<body>
  <!-- ================= HEADER ================= -->
  <header class="topbar">
    <div class="brand">
      <img src="assets/emblem.png" alt="Government of India Emblem" />
      <div class="brand-text">
        <h1>Digital Governance Dashboard</h1>
        <p>National e-Governance Division (NeGD)</p>
      </div>
    </div>

    <!-- Calendar + Day / Night Toggle -->
    <div class="theme-toggle">
      <!-- Calendar Button -->
      <button id="calendarBtn" class="icon-btn" title="Select Date">
        📅
      </button>

      <!-- Hidden Header Date Picker -->
      <input type="date" id="headerDatePicker" style="display: none;" />

      <!-- Night Mode -->
      <span>🌙</span>
      <label class="switch">
        <input type="checkbox" id="themeToggle" />
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <!-- ================= MAIN LAYOUT ================= -->
  <div class="layout">
    
    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar">
      <button class="nav-btn active">📄 Documents</button>
      <button class="nav-btn" disabled>📊 Summary</button>
    </aside>

    <!-- ========== CONTENT AREA ========== -->
    <main class="content">
      
      <!-- Filters -->
      <section class="filters">
        <div class="filter-group">
          <label>Select Date</label>
          <input type="date" id="datePicker" />
        </div>

        <div class="filter-group">
          <label>Select State</label>
          <select id="stateSelect">
            <option value="">-- Select --</option>
            <option>Kerala</option>
            <option>Karnataka</option>
            <option>Tamil Nadu</option>
            <option>Maharashtra</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Upload Report (PDF / DOCX)</label>
          <input type="file" id="fileUpload" accept=".pdf,.docx" />
        </div>
      </section>

      <!-- Documents Table -->
      <section class="table-section">
        <table>
          <thead>
            <tr>
              <th>Document Name</th>
              <th>State</th>
              <th>Date</th>
              <th>Type</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="documentsTable">
            <!-- Dynamic rows will be injected here -->
          </tbody>
        </table>
      </section>

    </main>
  </div>

  <!-- Scripts -->
  <script src="js/theme.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
