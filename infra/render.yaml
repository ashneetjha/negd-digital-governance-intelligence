services:
  - type: web
    name: negd-portal-backend
    env: python
    runtime: python-3.11
    region: singapore          # Closest to India
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 120
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LLM_PROVIDER
        value: groq
      - key: STRICT_REAL_AI
        value: "true"
      - key: SUPABASE_URL
        sync: false            # Set manually in Render dashboard
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: EMBEDDING_DIMENSION
        value: "384"
      - key: RAG_TOP_K
        value: "8"
      - key: CHUNK_SIZE
        value: "600"
      - key: CHUNK_OVERLAP
        value: "100"
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"
      - key: UPLOAD_DIR
        value: /tmp/negd_uploads
      - key: ALLOWED_ORIGINS
        value: '["https://your-site.vercel.app","https://your-site-git-main-yourteam.vercel.app","https://your-site.netlify.app"]'
