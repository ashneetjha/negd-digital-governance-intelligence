services:
  - type: web
    name: negd-portal-backend
    env: python
    runtime: python-3.11
    region: singapore          # Closest to India
    plan: free
    # Use lightweight requirements (no torch/sentence-transformers)
    # Embeddings handled via HuggingFace Inference API → ~250 MB RAM vs ~600 MB
    buildCommand: pip install -r backend/requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 120
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LLM_PROVIDER
        value: groq
      - key: STRICT_REAL_AI
        value: "true"

      # ── Secrets (set in Render dashboard, never committed) ────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HF_API_TOKEN
        sync: false            # Get from: https://huggingface.co/settings/tokens

      # ── Embedding (HF Inference API) ──────────────────────────────────────
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: EMBEDDING_MODEL
        value: sentence-transformers/paraphrase-MiniLM-L3-v2
      - key: EMBEDDING_DIMENSION
        value: "384"

      # ── RAG tuning ────────────────────────────────────────────────────────
      - key: RAG_TOP_K
        value: "8"
      - key: CHUNK_SIZE
        value: "600"
      - key: CHUNK_OVERLAP
        value: "100"

      # ── Uploads ───────────────────────────────────────────────────────────
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"
      - key: UPLOAD_DIR
        value: /tmp/negd_uploads

      # ── CORS (set to your Netlify site URL) ───────────────────────────────
      - key: ALLOWED_ORIGINS
        value: '["https://negd-digital-governance-intelligence.netlify.app"]'
