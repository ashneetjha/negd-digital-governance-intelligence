<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analyze Report | NeGD</title>

  <!-- Shared Styles -->
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/dashboard.css" />

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <!-- Mammoth.js (DOCX) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
</head>

<body>
  <!-- ================= HEADER ================= -->
  <header class="topbar">
    <div class="brand">
      <img src="assets/emblem.png" alt="Government of India Emblem" />
      <div class="brand-text">
        <h1>Report Analysis</h1>
        <p>National e-Governance Division (NeGD)</p>
      </div>
    </div>

    <div class="theme-toggle">
      <span>🌙</span>
      <label class="switch">
        <input type="checkbox" id="themeToggle" />
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <!-- ================= CONTENT ================= -->
  <main class="content">

    <section class="filters">
      <div class="filter-group">
        <label>Select Report (PDF / DOCX)</label>
        <input type="file" id="analyzeFile" accept=".pdf,.docx" />
      </div>
    </section>

    <!-- ================= RESULTS ================= -->

    <section class="table-section" style="margin-bottom: 24px;">
      <h3 style="padding:16px;">Rule-Based Insights</h3>
      <table>
        <tbody id="insightsTable">
          <tr><td>Headings Detected</td><td id="headingsCount">—</td></tr>
          <tr><td>Keywords Matched</td><td id="keywordsCount">—</td></tr>
          <tr><td>Approx Word Count</td><td id="wordCount">—</td></tr>
        </tbody>
      </table>
    </section>

    <section class="table-section">
      <h3 style="padding:16px;">Extracted Text (Preview)</h3>
      <div id="textOutput" style="padding:16px; white-space:pre-wrap; max-height:300px; overflow:auto;">
        No document analyzed yet.
      </div>
    </section>

  </main>

  <!-- Scripts -->
  <script src="js/theme.js"></script>
  <script src="js/analyze.js"></script>
</body>
</html>
